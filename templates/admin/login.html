{% extends "base.html" %}
{% block title %}Вход администратора · Музыкальный магазин{% endblock %}
{% block content %}
<section class="section page-section narrow">
  <div class="section-heading"><p class="eyebrow">Панель управления</p><h1>Вход администратора</h1></div>
  <form class="form-card" method="post">
    <label class="field">Электронная почта<input name="email" type="email" autocomplete="email" required></label>
    <label class="field">Пароль<input name="password" type="password" autocomplete="current-password" required></label>
    <button class="button primary">Войти как администратор</button>
    <p>Начальный администратор после `init-db`: <strong>admin@music-shop.local</strong> / <strong>admin12345</strong>.</p>
    <p>Покупатель? <a href="{{ url_for('ui.login') }}">Перейти к обычному входу</a>.</p>
  </form>
</section>
{% endblock %}
