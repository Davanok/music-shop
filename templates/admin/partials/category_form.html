<div class="panel-header">
    <h2>{{ 'Новая категория' if is_adding else 'Редактировать категорию' }}</h2>
</div>
<form class="form-card embedded-admin-form" method="post"
      action="{{ url_for('admin.categories.update', category_id=selected_category.id) if selected_category else url_for('admin.categories.add') }}">
    <label class="field">
        Название
        <input name="name" value="{{ selected_category.name if selected_category else '' }}" required>
    </label>
    <label class="field">
        Адрес категории
        <input name="slug" value="{{ selected_category.slug if selected_category else '' }}" placeholder="Если пусто, создается из названия">
    </label>
    <label class="field">
        Описание
        <textarea name="description" rows="4">{{ selected_category.description if selected_category else '' }}</textarea>
    </label>
    <label class="field">
        Изображение
        <input name="image_url" value="{{ selected_category.image_url if selected_category else '' }}">
    </label>
    {% if selected_category %}
    <img class="upload-preview" src="{{ selected_category.image_url }}" alt="{{ selected_category.name }}">
    {% endif %}
    <button class="button primary">Сохранить категорию</button>
</form>
{% if selected_category %}
<div class="delete-form-row">
    <form method="post" action="{{ url_for('admin.categories.delete', category_id=selected_category.id) }}">
        <button class="danger">Удалить категорию</button>
    </form>
</div>
{% endif %}
