<div class="panel-header">
    <h2>{{ 'Новый товар' if is_adding else 'Редактировать товар' }}</h2>
</div>
<form class="form-card embedded-admin-form" method="post" enctype="multipart/form-data"
      action="{{ url_for('admin.products.form', product_id=selected_product.id) if selected_product else url_for('admin.products.form') }}">
    <label class="field">
        Название
        <input name="name" value="{{ selected_product.name if selected_product else '' }}" required>
    </label>
    <label class="field">
        Адрес товара
        <input name="slug" value="{{ selected_product.slug if selected_product else '' }}" placeholder="Если пусто, создается из названия">
    </label>
    <label class="field">
        Категория
        <select name="category_id">
            {% for category in categories %}
            <option value="{{ category.id }}" {% if selected_product and selected_product.category_id == category.id %}selected{% endif %}>
                {{ category.name }}
            </option>
            {% endfor %}
        </select>
    </label>
    <div class="form-row">
        <label class="field">
            Цена
            <input name="price" type="number" min="0" step="0.01" value="{{ selected_product.price if selected_product else '0.00' }}" required>
        </label>
        <label class="field">
            Остаток
            <input name="stock" type="number" min="0" value="{{ selected_product.stock if selected_product else '0' }}" required>
        </label>
    </div>
    <label class="field checkbox-field">
        <input name="featured" type="checkbox" {% if selected_product and selected_product.featured %}checked{% endif %}>
        Избранный товар
    </label>
    <label class="field">
        Описание
        <textarea name="description" rows="4" required>{{ selected_product.description if selected_product else '' }}</textarea>
    </label>
    <label class="field">
        Ссылка на изображение
        <input name="image_url" value="{{ selected_product.image_url if selected_product else '' }}">
    </label>
    <label class="field upload-field">
        Загрузить изображение
        <input name="image_file" type="file" accept="image/*">
    </label>
    {% if selected_product %}
    <img class="upload-preview" src="{{ selected_product.image_url }}" alt="Предпросмотр {{ selected_product.name }}">
    {% endif %}
    <button class="button primary">Сохранить товар</button>
</form>
{% if selected_product %}
<div class="delete-form-row">
    <form method="post" action="{{ url_for('admin.products.delete', product_id=selected_product.id) }}">
        <button class="danger">Удалить товар</button>
    </form>
</div>
{% endif %}
