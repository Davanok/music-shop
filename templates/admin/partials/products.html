<div class="panel-header">
    <div>
        <p class="eyebrow">Товары</p>
        <h2>Товары</h2>
    </div>
    <a class="button primary" href="{{ url_for('admin.dashboard.index', section='products', action='new') }}" data-spa-link>
        Добавить
    </a>
</div>

<div class="toolbar">
    <input id="product-search" type="search" placeholder="Поиск товара..." onkeyup="filterTable('products-table', this.value)">
</div>

<table class="admin-table compact-admin-table products-table">
    <colgroup>
        <col style="width:60%">
        <col style="width:20%">
        <col style="width:20%">
    </colgroup>
    <thead>
    <tr>
        <th>Товар</th>
        <th>Цена</th>
        <th>Остаток</th>
    </tr>
    </thead>
    <tbody>
    {% for product in products %}
    <tr class="product-row {% if selected_product and selected_product.id == product.id %}selected{% endif %}"
        data-href="{{ url_for('admin.dashboard.index', section='products', entry_id=product.id) }}" data-spa-row>
        <td>
            <div class="entry-title-cell">
                <img src="{{ product.image_url }}" alt="{{ product.name }}" class="table-thumb">
                <div>
                    <strong>{{ product.name }}</strong>
                    <div class="product-meta">{{ product.category.name }}</div>
                </div>
            </div>
        </td>
        <td>{{ product.price|currency }}</td>
        <td>
            {% if product.stock == 0 %}
                <span class="stock danger">Нет</span>
            {% elif product.stock < 5 %}
                <span class="stock warning">{{ product.stock }}</span>
            {% else %}
                <span class="stock success">{{ product.stock }}</span>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
