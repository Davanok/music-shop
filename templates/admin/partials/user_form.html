<div class="panel-header">
    <h2>{{ 'Новый пользователь' if is_adding else 'Редактировать пользователя' }}</h2>
</div>
<form class="form-card embedded-admin-form" method="post"
      action="{{ url_for('admin.users.update', user_id=selected_user.id) if selected_user else url_for('admin.users.create') }}">
    <label class="field">
        Имя
        <input name="name" value="{{ selected_user.name if selected_user else '' }}" required>
    </label>
    <label class="field">
        Email
        <input name="email" type="email" value="{{ selected_user.email if selected_user else '' }}" required>
    </label>
    <label class="field">
        Пароль
        <input name="password" type="password" minlength="8"
               {% if not selected_user %}required{% endif %}
               placeholder="{{ 'Оставьте пустым, чтобы не менять' if selected_user else 'Минимум 8 символов' }}">
    </label>
    <label class="field">
        Роль
        <select name="role">
            {% for role, label in role_labels.items() %}
            <option value="{{ role }}" {% if selected_user and selected_user.role == role %}selected{% endif %}>
                {{ label }}
            </option>
            {% endfor %}
        </select>
    </label>
    <button class="button primary">Сохранить пользователя</button>
</form>
