<div class="panel-header">
    <div>
        <p class="eyebrow">Заказы</p>
        <h2>Заказы</h2>
    </div>
</div>

{% if orders %}
<table class="admin-table compact-admin-table orders-table">
    <colgroup>
        <col style="width:35%">
        <col style="width:35%">
        <col style="width:30%">
    </colgroup>
    <thead>
    <tr>
        <th>Заказ</th>
        <th>Клиент</th>
        <th>Сумма</th>
    </tr>
    </thead>
    <tbody>
    {% for order in orders %}
    <tr class="{% if selected_order and selected_order.id == order.id %}selected{% endif %}"
        data-href="{{ url_for('admin.dashboard.index', section='orders', entry_id=order.id) }}" data-spa-row>
        <td>
            <strong>{{ order.order_number }}</strong>
            <div class="product-meta">{{ order.created_at.strftime('%d.%m.%Y') }}</div>
        </td>
        <td>{{ order.user.name }}</td>
        <td>{{ order.total|currency }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p class="empty-state">Заказов пока нет.</p>
{% endif %}
