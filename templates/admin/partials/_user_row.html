<article class="user-row">

    <div class="user-info">

        <h3 class="user-name">
            {{ user.name }}
        </h3>

        <p class="user-email">
            {{ user.email }}
        </p>

        <div class="user-meta">

            <span class="role-badge">
                {{ role_labels.get(user.role, user.role) }}
            </span>

            {% if current_user.id == user.id %}
                <span class="current-user-badge">
                    Текущий пользователь
                </span>
            {% endif %}

        </div>

    </div>

    <div class="user-actions">

        {% if current_user.id == user.id %}

            <div class="role-readonly">
                <span class="text-muted">
                    Изменение собственной роли недоступно
                </span>
            </div>

        {% else %}

            <form
                class="role-form"
                method="post"
                action="{{ url_for('ui.admin_update_user_role', user_id=user.id) }}"
            >

                <label
                    class="sr-only"
                    for="role-{{ user.id }}"
                >
                    Роль пользователя {{ user.name }}
                </label>

                <select
                    id="role-{{ user.id }}"
                    name="role"
                >
                    {% for role, label in role_labels.items() %}
                        <option
                            value="{{ role }}"
                            {% if user.role == role %}selected{% endif %}
                        >
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

                <button
                    type="submit"
                    class="button ghost"
                >
                    Сохранить роль
                </button>

            </form>

        {% endif %}

    </div>

</article>
