<div class="panel-header">
    <div>
        <p class="eyebrow">Пользователи</p>
        <h2>Пользователи</h2>
    </div>
    <a class="button primary" href="{{ url_for('admin.dashboard.index', section='users', action='new') }}" data-spa-link>
        Добавить
    </a>
</div>

<table class="admin-table compact-admin-table users-table">
    <colgroup>
        <col style="width:70%">
        <col style="width:30%">
    </colgroup>
    <thead>
    <tr>
        <th>Пользователь</th>
        <th>Роль</th>
    </tr>
    </thead>
    <tbody>
    {% for user in users %}
    <tr class="{% if selected_user and selected_user.id == user.id %}selected{% endif %}"
        data-href="{{ url_for('admin.dashboard.index', section='users', entry_id=user.id) }}" data-spa-row>
        <td>
            <strong>{{ user.name }}</strong>
            <div class="product-meta">{{ user.email }}</div>
        </td>
        <td>{{ role_labels.get(user.role, user.role) }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
