{% extends "base.html" %}
{% block title %}{{ 'Edit' if product else 'Add' }} product · Music Shop{% endblock %}
{% block content %}
<section class="section page-section narrow"><div class="section-heading"><p class="eyebrow">Admin</p><h1>{{ 'Edit' if product else 'Add' }} product</h1></div><form class="form-card" method="post" enctype="multipart/form-data"><label class="field">Product name<input name="name" value="{{ product.name if product else '' }}" required></label><label class="field">Slug<input name="slug" value="{{ product.slug if product else '' }}" placeholder="Generated from name if blank"></label><label class="field">Category<select name="category_id">{% for category in categories %}<option value="{{ category.id }}" {% if product and product.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>{% endfor %}</select></label><div class="form-row"><label class="field">Price<input name="price" type="number" min="0" step="0.01" value="{{ product.price if product else '0.00' }}" required></label><label class="field">Stock<input name="stock" type="number" min="0" value="{{ product.stock if product else '0' }}" required></label></div><label class="field checkbox-field"><input name="featured" type="checkbox" {% if product and product.featured %}checked{% endif %}> Featured product</label><label class="field">Description<textarea name="description" rows="5" required>{{ product.description if product else '' }}</textarea></label><label class="field">Product image URL<input name="image_url" value="{{ product.image_url if product else '' }}"></label><label class="field upload-field">Upload product image to server storage<input name="image_file" type="file" accept="image/*"></label>{% if product %}<img class="upload-preview" src="{{ product.image_url }}" alt="{{ product.name }} preview">{% endif %}<div class="hero-actions"><button class="button primary">Save product</button><a class="button ghost" href="{{ url_for('admin_dashboard') }}">Cancel</a></div></form></section>
{% endblock %}
