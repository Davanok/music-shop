{% extends "base.html" %}
{% block title %}{{ 'Изменить' if product else 'Добавить' }} товар · MuzLove{% endblock %}
{% block content %}
<section class="section page-section narrow">
    <div class="section-heading">
        <p class="eyebrow">Администрирование</p>
        <h1>{{ 'Изменить' if product else 'Добавить' }} товар</h1>
    </div>
    <form
            class="form-card"
            method="post"
            enctype="multipart/form-data">
        <label class="field">
            Название товара
            <input name="name" value="{{ product.name if product else '' }}" required>
        </label>
        <label class="field">
            Адрес товара
            <input
                    name="slug"
                    value="{{ product.slug if product else '' }}"
                    placeholder="Если пусто, создается из названия">
        </label>
        <label class="field">
            Категория
            <select name="category_id">
                {% for category in categories %}
                <option value="{{ category.id }}" {% if product and product.category_id== category.id %}selected{% endif
                        %}>{{ category.name }}
                </option>
                {% endfor %}
            </select>
        </label>
        <div class="form-row">
            <label class="field">
                Цена
                <input
                        name="price"
                        type="number"
                        min="0"
                        step="0.01"
                        value="{{ product.price if product else '0.00' }}"
                        required>
            </label>
            <label class="field">
                Остаток
                <input
                        name="stock"
                        type="number"
                        min="0"
                        value="{{ product.stock if product else '0' }}"
                        required>
            </label>
        </div>
        <label class="field checkbox-field">
            <input
                    name="featured"
                    type="checkbox"
                    {% if product and product.featured %}checked{% endif %}>
            Избранный товар
        </label>
        <label class="field">
            Описание
            <textarea
                    name="description" rows="5"
                    required>
                {{ product.description if product else '' }}
            </textarea>
        </label>
        <label class="field">
            Ссылка на изображение
            <input
                    name="image_url"
                    value="{{ product.image_url if product else '' }}">
        </label>
        <label class="field upload-field">
            Загрузить изображение товара
            <input
                    name="image_file"
                    type="file"
                    accept="image/*">
        </label>
        {% if product %}
        <img
                class="upload-preview"
                src="{{ product.image_url }}"
                alt="Предпросмотр {{ product.name }}">
        {% endif %}
        <div class="hero-actions">
            <button class="button primary">Сохранить товар</button>
            <a class="button ghost" href="{{ url_for('admin.dashboard.index') }}">Отмена</a></div>
    </form>
</section>
{% endblock %}
