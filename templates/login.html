{% extends "base.html" %}

{% block title %}Вход · Музыкальный магазин{% endblock %}

{% block content %}
<section class="section page-section">
  <div class="section-heading">
    <p class="eyebrow">Личный кабинет</p>
    <h1>Вход</h1>
  </div>

  <form class="form-card auth-form" method="post" autocomplete="on">
    <label class="field">
      Электронная почта
      <input
        name="email"
        type="email"
        autocomplete="email"
        required
      >
    </label>

    <label class="field">
      Пароль
      <input
        name="password"
        type="password"
        autocomplete="current-password"
        required
      >
    </label>

    <button type="submit" class="button primary">
      Войти
    </button>

    <p class="hint">
      Нет аккаунта?
      <a href="{{ url_for('ui.signup') }}">Зарегистрироваться</a>
    </p>

    <p class="hint">
      Администратор?
      <a href="{{ url_for('ui.login') }}">Вход для администратора</a>
    </p>
  </form>
</section>
{% endblock %}
