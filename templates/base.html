<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Music Shop{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ url_for('ui.home') }}"><span class="brand-mark">♪</span><span>Music Shop</span></a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="{{ url_for('ui.home') }}#catalog">Catalog</a>
        <a href="{{ url_for('ui.account') }}">Account</a>
        <a href="{{ url_for('ui.admin_dashboard') }}">Admin</a>
        <a class="cart-link" href="{{ url_for('ui.cart') }}">Cart <span>{{ cart_count }}</span></a>
      </nav>
    </header>
    <main>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-stack">
            {% for category, message in messages %}<p class="flash {{ category }}">{{ message }}</p>{% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
